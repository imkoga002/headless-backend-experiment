services:
  app:
    build:
      target: builder
    volumes:
      - ..:/workspace:cached
      - cargo_registry:/usr/local/cargo/registry
      - cargo_target:/workspace/target
    working_dir: /workspace
    command: sleep infinity
    environment:
      RUST_LOG: debug
      RUST_BACKTRACE: 1
      DATABASE_URL: postgres://app:devpassword@db:5432/rs_headless_backend

  db:
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: devpassword

volumes:
  cargo_registry:
  cargo_target:
